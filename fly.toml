# Fly.io config — SQLite on persistent volume
app = "bolinjcha-mandal"
# sin = Singapore (free tier, good for India). bom = Mumbai but needs a payment method on Fly.
primary_region = "sin"

[build]

[env]
  DATA_DIR = "/data"
  DATABASE_URL = "file:/data/dev.db"
  NODE_ENV = "production"
  PORT = "3000"
  HOSTNAME = "0.0.0.0"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "mandal_data"
  destination = "/data"
